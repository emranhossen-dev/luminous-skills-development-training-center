<!DOCTYPE html>
<html>
<head>
    <title>Test API</title>
</head>
<body>
    <h1>Testing Course APIs</h1>
    <button onclick="testPublicAPI()">Test Public API</button>
    <button onclick="testAdminAPI()">Test Admin API</button>
    <div id="result"></div>

    <script>
        async function testPublicAPI() {
            try {
                const response = await fetch('http://localhost:3000/api/courses');
                const data = await response.json();
                document.getElementById('result').innerHTML = '<h2>Public API Response:</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<h2>Public API Error:</h2><pre>' + error.message + '</pre>';
            }
        }

        async function testAdminAPI() {
            try {
                const response = await fetch('http://localhost:3000/api/admin/courses', {
                    headers: {
                        'Authorization': 'Bearer your-token-here'
                    }
                });
                const data = await response.json();
                document.getElementById('result').innerHTML = '<h2>Admin API Response:</h2><pre>' + JSON.stringify(data, null, 2) + '</pre>';
            } catch (error) {
                document.getElementById('result').innerHTML = '<h2>Admin API Error:</h2><pre>' + error.message + '</pre>';
            }
        }
    </script>
</body>
</html>
